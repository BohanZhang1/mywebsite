---
layout: archive
title: "Projects"
permalink: /portfolio/
author_profile: true
---

{% include base_path %}

{% for post in site.portfolio %}
  <div class="site-card" style="display:flex; border:1px solid #d1d9e6; border-radius:10px; margin:0.65em 0; overflow:hidden; background:#fff; box-shadow:0 1px 5px rgba(0,0,0,0.07); align-items:stretch; min-height:130px;">

    <!-- Media -->
    <div class="site-card-media" style="flex:0 0 185px; max-width:185px; background:#e8eef8; overflow:hidden; display:flex; align-items:center; justify-content:center;">
      {% if post.video %}
        <video src="{{ site.baseurl }}{{ post.video }}" autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover; min-height:130px; display:block;"></video>
      {% elsif post.image %}
        <img src="{{ site.baseurl }}{{ post.image }}" alt="{{ post.title }}" style="width:100%; height:100%; object-fit:cover; min-height:130px; display:block;"/>
      {% else %}
        <div style="width:100%; min-height:130px; display:flex; align-items:center; justify-content:center;">
          <span style="font-size:2em; color:#c0cfe0;">&#128187;</span>
        </div>
      {% endif %}
    </div>

    <!-- Content -->
    <div style="flex:1; padding:0.85em 1.1em 0.75em; min-width:0; display:flex; flex-direction:column; justify-content:space-between; gap:0.3em;">

      <div>
        <h3 style="margin:0 0 0.2em; font-size:0.93em; line-height:1.4; font-weight:600;">
          <a href="{{ base_path }}{{ post.url }}" style="color:#111827; text-decoration:none;">{{ post.title }}</a>
        </h3>
        <p class="card-excerpt" style="font-size:0.83em; color:#374151; margin:0; line-height:1.5; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;">
          {{ post.excerpt | strip_html }}
        </p>
      </div>

      <div style="margin-top:0.4em;">
        <a href="{{ base_path }}{{ post.url }}" class="site-btn-neutral" style="font-size:0.73em; background:#f1f5f9; color:#111827; padding:3px 10px; border-radius:4px; text-decoration:none; font-weight:500; border:1px solid #cbd5e1; white-space:nowrap;">Explore →</a>
      </div>

    </div>
  </div>
{% endfor %}
